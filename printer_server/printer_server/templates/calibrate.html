
{% extends "base.html" %}

{% block title %}3D Printer Calibration{% endblock %}

{% block printer3d_state %}
<h2 id='printer-state'></h2>
{% endblock %}

{% block styles %}
{{ super() }}
<link href="{{ url_for('static', filename='css/controls.css') }}" rel="stylesheet">
{% endblock %}

{% block page_content %}

<div class="row mb-2" id="printer-controls">
  <div class="col-auto mr-auto">
    <button type="button" class="printer-btn btn btn-lg btn-primary d-none" data-toggle="modal" data-target="#confirmModal" id="init-btn">Matthew</button>
  </div>
  <div class="col-auto">
    <button class="btn btn-lg btn-info" type="button" data-toggle="collapse" data-target="#collapseUpload" aria-expanded="false" aria-controls="collapseUpload" id="create-job">Create a job</button>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="confirmModal" tabindex="-1" role="dialog" aria-labelledby="confirmModalTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="print-alert-title"></h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="print-alert-body">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal" id="print-alert-cancel">Cancel</button>
        <button type="button" class="btn btn-primary" data-dismiss="modal" id="print-alert-confirm">Confirm</button>
      </div>
    </div>
  </div>
</div>

 <div class="progress d-none" id="print-progress">
   <div class="progress-bar progress-bar-striped progress-bar-animated bg-info" id="print-progress-bar" role="progressbar" style="width:0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
 </div>
<hr>



{% endblock %}

{% block scripts %}
{{super()}}
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.1.0/socket.io.js"></script>
<script src="{{ url_for('static', filename='js/sockets.js') }}"></script>
<script src="{{ url_for('static', filename='js/upload.js') }}"></script>
{% endblock %}
