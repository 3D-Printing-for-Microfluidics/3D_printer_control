{% extends "base.html" %}

{% block title %}Users ({{ hostname }}){% endblock %}

{% block printer3d_state %}
<h2>{{ hostname }} - Users</h2>
{% endblock %}

{% block styles %}
{{ super() }}
<link href="{{ url_for('static', filename='users.css') }}" rel="stylesheet">
{% endblock %}

{% block page_content %}

<!-- <br> -->

<div class="d-flex justify-content-end mb-2">
    <button type="button" class="btn btn-outline-info" id="addUserBtn">
        Add User
    </button>
    <button type="button" class="btn btn-outline-info" id="manageUsersBtn">
        Manage Users
    </button>
</div>

<br>

<div id="main-table-container"></div>

{% endblock %}

{% block scripts %}
{{ super() }}
<script src="{{ url_for('static', filename='lib/ajax-socket.io-4.7.5.min.js') }}"></script>
<script src="{{ url_for('static', filename='users.js') }}"></script>
{% endblock %}
