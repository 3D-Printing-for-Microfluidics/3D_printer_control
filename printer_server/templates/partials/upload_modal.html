<div class="modal fade" id="uploadModal" tabindex="-1" role="dialog" aria-labelledby="uploadModalTitle" aria-hidden="true">
    <div class="modal-lg modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="uploadModalTitle">Upload Files</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group mb-4">
                    <label class="small text-muted">Upload as:</label>
                    <div class="btn-group btn-group-toggle w-100" data-toggle="buttons">
                        <label class="btn btn-outline-secondary active">
                            <input type="radio" name="userOption" id="currentUser" checked> Current User
                        </label>
                        <label class="btn btn-outline-secondary">
                            <input type="radio" name="userOption" id="otherUser"> Other User
                        </label>
                    </div>
                    <datalist id="usernames">
                        {% for username in usernames %}
                            <option value="{{ username }}">
                        {% endfor %}
                    </datalist>
                    <input type="text" id="otherUserField" class="form-control mt-2 d-none" {% if usernames %}list="usernames"{% endif %} placeholder="Enter username...">
                </div>
                <br>
                <small>Select files from your computer</small>
                <div class="form-inline mb-3">
                    <button type="button" class="btn btn-sm btn-outline-info" 
                            onClick="document.getElementById('file-picker').click();" id="choose-file">Choose</button>&nbsp;
                    <input id="file-picker" multiple="" name="file" style="display:none" type="file" accept=".zip">
                    <span id="file-number" class="ml-2">No files selected</span>
                </div>

                <small>Or drag and drop files below</small>
                <div class="upload-dropbox mb-3" id="dropbox">
                    Just drag and drop files here
                </div>

                <div class="progress d-none" id="upload-progress">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                         id="upload-progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0"
                         aria-valuemax="100" style="width:0%;">
                        <span class="sr-only" id="upload-completion">0%</span>
                    </div>
                </div>

                <ul class="list-group mt-2" id="selected-files">
                </ul>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="upload-btn">Upload</button>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='upload.js') }}"></script>
