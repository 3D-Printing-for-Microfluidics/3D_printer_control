<!-- Calibration Motor Control -->
<div class="container tiptilt-controls">
    <div class="container">
        <div class="row">
            <div class="col-9">
                <h3>TipTilt Controls</h3>
            </div>
            <div class="col-3">
                <div class="btn-group btn-group-toggle float-right" data-toggle="buttons">
                    <label class="btn btn-outline-info btn-fixed-width shadow-none active"><input type="radio"
                            checked>Precise</label>
                    <label class="btn btn-outline-info btn-fixed-width shadow-none"><input type="radio"
                            id="quick_move">Fast</label>
                </div>
            </div>
        </div>
    </div>

    <!-- Tip -->
    <div class="container" aria-label="Tip">
        <div class="row">
            <div class="col-4">
                <h5>Tip</h5>
            </div>
            <div class="col-2">
                <h5 class="col text-right" id='tip-state'>{{ tip_position }}</h5>
            </div>
            <div class="col-6">
                <input class="form-control tt-cntrl-txt" type="text" id="tip-txt" placeholder="Position (um)">
            </div>
        </div>

        <div class="row">
            <div class="col-2">
            </div>
            <div class="col-2 text-left">
                <button type="button" class="btn btn-outline-info btn-block tt-home-btn" id="tip-home-btn">Home</button>
            </div>
            <div class="col-8 text-right">
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">-1000</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">-100</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">-10</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">-1</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">1</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">10</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">100</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">1000</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Tilt -->
    <div class="container" aria-label="Tilt">
        <div class="row">
            <div class="col-4">
                <h5>Tilt</h5>
            </div>
            <div class="col-2">
                <h5 class="col text-right" id='tilt-state'>{{ tilt_position }}</h5>
            </div>
            <div class="col-6">
                <input class="form-control tt-cntrl-txt" type="text" id="tilt-txt" placeholder="Position (um)">
            </div>
        </div>
        <div class="row">
            <div class="col-2">
            </div>
            <div class="col-2 text-left">
                <button type="button" class="btn btn-outline-info btn-block tt-home-btn"
                    id="tilt-home-btn">Home</button>
            </div>
            <div class="col-8 text-right">
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">-1000</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">-100</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">-10</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">-1</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">1</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">10</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">100</button>
                    <button type="button" class="btn btn-outline-info tt-cntrl-btn">1000</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('manual_controls.static', filename='tiptilt/tiptilt_snip.js') }}"></script>
