<!-- Calibration Motor Control -->
<div class="container tiptilt-controls">
    <div class="container">
        <div class="row">
            <div class="col-9">
                <h3>TipTilt Controls</h3>
            </div>
            <div class="col-3">
                <div class="btn-group btn-group-toggle float-right" data-toggle="buttons">
                    <label class="btn btn-outline-info btn-fixed-width shadow-none active"><input type="radio"
                            checked>Precise</label>
                    <label class="btn btn-outline-info btn-fixed-width shadow-none"><input type="radio"
                            id="quick_move">Fast</label>
                </div>
            </div>
        </div>
    </div>

    {% set axes = ['Tip', 'Tilt'] %}
    {% set axes_text = dict() %}
    {% set _dummy = axes_text.update({'Tip':tip_position}) %}
    {% set _dummy = axes_text.update({'Tilt':tilt_position}) %}

    {% for axis in axes %}
    <div class="container" aria-label="{{ axis }}">
        <div class="row">
            <div class="col-4">
                <h5>{{ axis }}</h5>
            </div>
            <div class="col-2">
                <h5 class="col text-right" id='{{ axis|lower }}-state'>{{ axes_text[axis] }}</h5>
            </div>
            <div class="col-6">
                <input class="form-control {{ axis|lower }}-cntrl-txt" type="text" id="{{ axis|lower }}-txt" placeholder="Position (um)">
            </div>
        </div>

        <div class="row">
            <div class="col-2">
            </div>
            <div class="col-2 text-left">
                <button type="button" class="btn btn-outline-info btn-block {{ axis|lower }}-home-btn" id="{{ axis|lower }}-home-btn">Home</button>
            </div>
            <div class="col-8 text-right">
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-info {{ axis|lower }}-cntrl-btn">-1000</button>
                    <button type="button" class="btn btn-outline-info {{ axis|lower }}-cntrl-btn">-100</button>
                    <button type="button" class="btn btn-outline-info {{ axis|lower }}-cntrl-btn">-10</button>
                    <button type="button" class="btn btn-outline-info {{ axis|lower }}-cntrl-btn">-1</button>
                    <button type="button" class="btn btn-outline-info {{ axis|lower }}-cntrl-btn">1</button>
                    <button type="button" class="btn btn-outline-info {{ axis|lower }}-cntrl-btn">10</button>
                    <button type="button" class="btn btn-outline-info {{ axis|lower }}-cntrl-btn">100</button>
                    <button type="button" class="btn btn-outline-info {{ axis|lower }}-cntrl-btn">1000</button>
                </div>
            </div>
        </div>

    </div>
    {% endfor %}
</div> 

<script src="{{ url_for('manual_controls.static', filename='tiptilt/tiptilt_snip.js') }}"></script>
