<div class="centered_section">
    <div class="central_column">

            <button class="btn btn-success" id="init_btn">Initialize</button>

        </div>

            <div class="bordered_section">

                <div class="container">
                    <div class="row">
                        <div class="col">
                            <h5>R axis (X) -</h5>
                        </div>
                        <div class="col">
                            <h5 class="col text-right" id="pivot_R_state">0.0um</h5>
                        </div>
                        <div class="col">
                            <input type="text" id="pivot_R_state_input" placeholder="Position (um)">
                        </div>
                        <div class="col btn-group">
                            <button type="button" class="btn btn-outline-info hexapod-cntrl-btn"
                                id="pivot_R_-10">-10</button>
                            <button type="button" class="btn btn-outline-info hexapod-cntrl-btn"
                                id="pivot_R_-1">-1</button>
                            <button type="button" class="btn btn-outline-info hexapod-cntrl-btn"
                                id="pivot_R_+1">1</button>
                            <button type="button" class="btn btn-outline-info hexapod-cntrl-btn"
                                id="pivot_R_+10">10</button>
                        </div>
                    </div>

                    <div class="row">

                            <h5>S axis (Y) -</h5>

                                id="pivot_S_-1">-1</button>
                            <button type="button" class="btn btn-outline-info hexapod-cntrl-btn"

                            <button type="button" class="btn btn-outline-info hexapod-cntrl-btn"
                                id="pivot_S_+10">10</button>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col">

                            <button type="button" class="btn btn-outline-info hexapod-cntrl-btn"

                    <div class="row">
