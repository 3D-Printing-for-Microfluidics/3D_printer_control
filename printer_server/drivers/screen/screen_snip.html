<!-- Upload Image -->
<div class="container screen">
    <div class="row">
        <div class="col-12">
            <h3>Virtual Screen</h3>
        </div>
    </div>

    <div class="row">
        <h5 class="col-4 text-left">Image</h5>
        <form class="col-5">
            <input type="file" class="form-control-file" name="file" accept=".png" id="file-picker">
            <div class="invalid-feedback">
                Please provide an 8-bit grayscale PNG file.
            </div>
        </form>
        <div class="col-3">
            <button type="button" class="btn btn-outline-info btn-block" id="upload-btn">Upload</button>
        </div>
    </div>
</div>

<script src="screen_snip.js"></script>
