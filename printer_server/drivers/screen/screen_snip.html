<!-- Upload Image -->
<div class="container screen">
    <div class="row">
        <div class="col-12">
            <h3>Virtual Screen</h3>
        </div>
    </div>

    {% for light_engine in manual_controls_data['light_engines'].keys() %}
    <div class="container" aria-label="{{ light_engine }}">
        <div class="row">
            <h5 class="col-2 text-left">{{ light_engine|capitalize }}</h5>
            <div class="col-2">
                <img id="{{ light_engine }}-preview" style="display:none; opacity: 0.5;" />
            </div>
            <form class="col-3">
                <div class="row">
                    <input type="file" class="form-control-file" name="file" accept=".png" id="{{ light_engine }}-file-picker">
                    <div class="invalid-feedback">
                        Please provide an 8-bit grayscale PNG file.
                    </div>
                </div>
                <div class="row">
                    <div class="form-check text-center">
                        <input class="form-check-input" type="checkbox" value="" id="{{ light_engine }}-light-correction-chkbx">
                        <label class="form-check-label" for="{{ light_engine }}-light-correction-chkbx">Use light grayscale correction</label>
                    </div>
                </div>
                <div class="row">
                    <div class="form-check text-center">
                        <input class="form-check-input" type="checkbox" value="" id="{{ light_engine }}-dark-correction-chkbx">
                        <label class="form-check-label" for="{{ light_engine }}-dark-correction-chkbx">Use dark grayscale correction</label>
                    </div>
                </div>
            </form>
            <div class="col-5">
                <div class="row">
                    <div class="col-6">
                        <button type="button" class="btn btn-outline-info btn-block"
                            id="{{ light_engine }}-upload-btn">Upload</button>
                    </div>
                    <div class="col-6">
                        <button type="button" class="btn btn-outline-info btn-block" id="{{ light_engine }}-draw-btn">Draw</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col-6">
                        <button type="button" class="btn btn-outline-info btn-block" id="{{ light_engine }}-white-btn">Draw
                            White</button>
                    </div>
                    <div class="col-6">
                        <button type="button" class="btn btn-outline-info btn-block"
                            id="{{ light_engine }}-clear-btn">Clear</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script src="{{ url_for('manual_controls.static', filename='screen/screen_snip.js') }}"></script>
