<!-- Calibration Motor Control -->
<div class="container keyence">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h3>Keyence Sensors</h3>
            </div>
        </div>
    </div>

    {% for sensor in hardware['keyence']['sensors'] %}
    <div class="container" aria-label="{{sensor}}">
        <div class="row">
            <div class="col-2">
                <h5>{{ sensor|capitalize}}</h5>
            </div>
            <div class="col-3 text-right">
                <h5>Current Value:</h5>
            </div>
            <div class="col-3">
                <h5 class="col text-left" id='{{ sensor }}-value'>{{
                    hardware['keyence']['readings'][sensor] }} um
                </h5>
            </div>
        </div>
        <div class="row">
            <div class="col-2"></div>
            <div class="col-3 text-right">
                <h5>Focus Setpoint:</h5>
            </div>
            <div class="col-3">
                <h5 class="col text-left" id='{{ sensor }}-focus'>{{
                    hardware['keyence']['focus'][sensor] }} um
                </h5>
            </div>
            <div class="col-4">
                <input class="form-control {{ sensor }}-cntrl-txt" type="text" id="{{ sensor }}-txt"
                    placeholder="Position (um)">
            </div>
        </div>
        <div class="row">
            <div class="col-4"></div>
            <div class="col-8 text-right">
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-info {{ sensor }}-cntrl-btn">-1000</button>
                    <button type="button" class="btn btn-outline-info {{ sensor }}-cntrl-btn">-100</button>
                    <button type="button" class="btn btn-outline-info {{ sensor }}-cntrl-btn">-10</button>
                    <button type="button" class="btn btn-outline-info {{ sensor }}-cntrl-btn">-1</button>
                    <button type="button" class="btn btn-outline-info {{ sensor }}-cntrl-btn">1</button>
                    <button type="button" class="btn btn-outline-info {{ sensor }}-cntrl-btn">10</button>
                    <button type="button" class="btn btn-outline-info {{ sensor }}-cntrl-btn">100</button>
                    <button type="button" class="btn btn-outline-info {{ sensor }}-cntrl-btn">1000</button>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script src="{{ url_for('manual_controls.static', filename='keyence/keyence_snip.js') }}"></script>
