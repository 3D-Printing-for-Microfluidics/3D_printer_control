<!-- Calibration Motor Control -->
<div class="container keyence">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h3>Keyence Sensors</h3>
            </div>
        </div>
    </div>

    {% for sensor in manual_controls_data['keyence']['sensors'] %}
    <div class="container" aria-label="{{sensor}}">
        <div class="row">
            <div class="col-2">
                <h5>{{ sensor|capitalize}}</h5>
            </div>
            <div class="col-3 text-right">
                <h5>Current Value:</h5>
            </div>
            <div class="col-3">
                <h5 class="col text-left" id='{{ sensor }}-value'>{{
                    manual_controls_data['keyence']['readings'][sensor] }} um
                </h5>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script src="{{ url_for('manual_controls.static', filename='keyence/keyence_snip.js') }}"></script>
