<!-- Calibration Motor Control -->
<div class="container kdc-controls">
    <div class="container">
        <div class="row">
            <div class="col-4">
                <h3>Focus Controls</h3>
            </div>
            <div class="col-4"></div>
            <div class="col-4 text-left">
                <button type="button" class="btn btn-outline-info btn-block kdc-home-btn"
                    id="dist-home-btn">Home</button>
            </div>
        </div>
    </div>

    <!-- Distance -->
    <div class="container" aria-label="Distance">
        <div class="row">
            <div class="col-4">
                <h5>Distance</h5>
            </div>
            <div class="col-2">
                <h5 class="col text-right" id='dist-state'>{{ positions['distance'] }}</h5>
            </div>
            <div class="col-6">
                <input class="form-control kdc-cntrl-txt" type="text" id="distance-txt" placeholder="Position (um)">
            </div>
        </div>
        <div class="row">
            <div class="col-4 text-left">
            </div>
            <div class="col-8 text-right">
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-info kdc-cntrl-btn">-1000</button>
                    <button type="button" class="btn btn-outline-info kdc-cntrl-btn">-100</button>
                    <button type="button" class="btn btn-outline-info kdc-cntrl-btn">-10</button>
                    <button type="button" class="btn btn-outline-info kdc-cntrl-btn">-1</button>
                    <button type="button" class="btn btn-outline-info kdc-cntrl-btn">1</button>
                    <button type="button" class="btn btn-outline-info kdc-cntrl-btn">10</button>
                    <button type="button" class="btn btn-outline-info kdc-cntrl-btn">100</button>
                    <button type="button" class="btn btn-outline-info kdc-cntrl-btn">1000</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('manual_controls.static', filename='kdc101/kdc101_snip.js') }}"></script>
