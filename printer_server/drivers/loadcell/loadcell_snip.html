<div class="container loadcell">
    <div class="row">
        <div class="col-6">
            <h3>Loadcell Controls</h3>
        </div>
    </div>
    <div class="row">
        <div class="col-6">
            <h5>Loadcell Graph Y-Axis</h5>
        </div>
        <div class="col-6">
            <div id="loadcell_graph_mode" class="btn-group btn-group-toggle float-right" data-toggle="buttons">
                <label
                    class="btn btn-outline-info btn-fixed-width shadow-none {% if not manual_controls_data['loadcell']['in_newtons'] %} active {% endif %}">Counts<input
                        type="radio"></label>
                <label
                    class="btn btn-outline-info btn-fixed-width shadow-none {% if manual_controls_data['loadcell']['in_newtons'] %} active {% endif %}">Newtons<input
                        type="radio"></label>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-6">
            <h5>Loadcell Graph Autoscale</h5>
        </div>
        <div class="col-6">
            <div id="loadcell_graph_autoscale" class="btn-group btn-group-toggle float-right" data-toggle="buttons">
                <label
                    class="btn btn-outline-info btn-fixed-width shadow-none {% if manual_controls_data['loadcell']['autoscale'] %} active {% endif %}">True<input
                        type="radio"></label>
                <label
                    class="btn btn-outline-info btn-fixed-width shadow-none {% if not manual_controls_data['loadcell']['autoscale'] %} active {% endif %}">False<input
                        type="radio"></label>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('manual_controls.static', filename='loadcell/loadcell_snip.js') }}"></script>
