<!-- Light Engine Control -->
<div class="container top-buffer light-engine">
    <div class="row">
        <div class="col-12">
            <h3>Light Engine</h3>
        </div>
    </div>

    <!-- LED Power -->
    <div class="row">
        <h5 class="col-3 text-left">LED Power</h5>
        <h5 class="col-1 text-left" id="led-power-label"></h5>
        <div class="slidecontainer col-8"><input type="range" min="1" max="200" value="100" class="slider"
                id="led-power-slider"></div>
    </div>

    <!-- Repeat and Exposure Time -->
    <div class="row">
        <h5 class="col-4 text-left">Exposure</h5>
        <div class="col-2 form-group text-center">
            <input class="form-check-input" type="checkbox" value="" id="repeat-chkbx">
            <label class="form-check-label" for="repeat-chkbx">Repeat</label>
        </div>
        <div class="col-6 form-group">
            <input class="form-control" type="text" id="exposure-txt" placeholder="Exposure Time (ms)">
            <div class="invalid-feedback">
                Please provide an integer greater than zero.
            </div>
        </div>
    </div>

    <!-- Start Stop -->
    <div class="row">
        <h5 class="col-6">Project</h5>
        <div class="col-3"><button type="button" class="btn btn-outline-info btn-block" id="le-start-btn">Start</button>
        </div>
        <div class="col-3"><button type="button" class="btn btn-outline-info btn-block" id="le-stop-btn">Stop</button>
        </div>
    </div>

</div>

<script src="visitech_snip.js"></script>
