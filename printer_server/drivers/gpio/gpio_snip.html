<div class="container gpio">
    <div class="row">
        <div class="col-6">
            <h3>GPIO Controls</h3>
        </div>
    </div>
    {% if 'film_state' in manual_controls_data['gpio']%}
    <div class="row">
        <div class="col-6">
            <h5>Film Relay</h5>
        </div>
        <div class="col-6">
            <div id="film-relay" class="btn-group btn-group-toggle float-right" data-toggle="buttons">
                <label
                    class="btn btn-outline-info btn-fixed-width shadow-none {% if manual_controls_data['gpio']['film_state'] %} active {% endif %}">On<input
                        type="radio"></label>
                <label
                    class="btn btn-outline-info btn-fixed-width shadow-none {% if not manual_controls_data['gpio']['film_state'] %} active {% endif %}">Off<input
                        type="radio"></label>
            </div>
        </div>
    </div>
    {% endif %}
</div>

<script src="{{ url_for('manual_controls.static', filename='gpio/gpio_snip.js') }}"></script>
