<!-- Coord Systems Control -->
<div class="container coord">
    <div class="row">
        <div class="col-4">
            <h3>Coordinate System</h3>
        </div>
        <div class="col-8">
            <div id="coord_systems" class="btn-group btn-group-toggle float-right" data-toggle="buttons">
                {% for coord in manual_controls_data['coord_systems'] %}
                <label
                    class="btn btn-outline-info shadow-none">{{
                    coord|capitalize }}<input type="radio" id="{{coord | replace(' ', '-') }}"></label>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('manual_controls.static', filename='coord_systems/coord_systems_snip.js') }}"></script>
